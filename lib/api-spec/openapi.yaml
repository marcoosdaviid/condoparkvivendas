openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Condo Parking Spot Sharing API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User operations
  - name: spots
    description: Parking spot operations
  - name: requests
    description: Parking spot request operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/register:
    post:
      operationId: registerUser
      tags: [users]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "409":
          description: Phone already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/login:
    post:
      operationId: loginUser
      tags: [users]
      summary: Login by phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /spots:
    get:
      operationId: getAvailableSpots
      tags: [spots]
      summary: Get all parking spots for today
      responses:
        "200":
          description: List of spots today
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParkingSpot"

    post:
      operationId: createSpot
      tags: [spots]
      summary: Share a parking spot as available today
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSpotInput"
      responses:
        "201":
          description: Spot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingSpot"
        "409":
          description: User already has a spot listed today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /spots/{id}:
    delete:
      operationId: removeSpot
      tags: [spots]
      summary: Remove a parking spot listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Spot removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Spot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /spots/{id}/interest:
    post:
      operationId: expressInterest
      tags: [spots]
      summary: Express interest in a spot (AVAILABLE -> PENDING_CONFIRMATION)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpressInterestInput"
      responses:
        "200":
          description: Status updated to PENDING_CONFIRMATION
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingSpot"
        "404":
          description: Spot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Spot not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /spots/{id}/confirm:
    post:
      operationId: confirmOccupation
      tags: [spots]
      summary: Confirm spot occupation (PENDING_CONFIRMATION -> OCCUPIED)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmOccupationInput"
      responses:
        "200":
          description: Status updated to OCCUPIED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingSpot"
        "404":
          description: Spot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Spot not in PENDING_CONFIRMATION state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /spots/{id}/vacate:
    post:
      operationId: vacateSpot
      tags: [spots]
      summary: Mark spot as vacated (OCCUPIED -> FINISHED or AVAILABLE)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Status updated to FINISHED or AVAILABLE
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingSpot"
        "404":
          description: Spot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Spot not in OCCUPIED state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /requests:
    get:
      operationId: getSpotRequests
      tags: [requests]
      summary: Get all parking spot requests
      responses:
        "200":
          description: List of spot requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpotRequest"

    post:
      operationId: createSpotRequest
      tags: [requests]
      summary: Create a parking spot request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSpotRequestInput"
      responses:
        "201":
          description: Request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotRequest"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /requests/{id}/offer:
    post:
      operationId: offerSpotForRequest
      tags: [requests]
      summary: Offer a parking spot for a request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfferSpotInput"
      responses:
        "200":
          description: Request matched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotRequest"
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Request already matched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /requests/{id}:
    delete:
      operationId: deleteSpotRequest
      tags: [requests]
      summary: Delete a spot request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Request deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        apartment:
          type: string
        phone:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, apartment, phone, createdAt]

    RegisterUserInput:
      type: object
      properties:
        name:
          type: string
        apartment:
          type: string
        phone:
          type: string
      required: [name, apartment, phone]

    LoginInput:
      type: object
      properties:
        phone:
          type: string
      required: [phone]

    ParkingSpot:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        userApartment:
          type: string
        userPhone:
          type: string
        availableFrom:
          type: string
        availableUntil:
          type: string
        date:
          type: string
        status:
          type: string
          enum: [AVAILABLE, PENDING_CONFIRMATION, OCCUPIED, FINISHED]
        interestedUserId:
          type: integer
          nullable: true
        interestedUserName:
          type: string
          nullable: true
        interestedUserPhone:
          type: string
          nullable: true
        interestedUserApartment:
          type: string
          nullable: true
        occupantName:
          type: string
          nullable: true
        occupantApartment:
          type: string
          nullable: true
        carPlate:
          type: string
          nullable: true
        expectedExitTime:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - userName
        - userApartment
        - userPhone
        - availableFrom
        - availableUntil
        - date
        - status
        - createdAt

    CreateSpotInput:
      type: object
      properties:
        userId:
          type: integer
        availableFrom:
          type: string
        availableUntil:
          type: string
      required: [userId, availableFrom, availableUntil]

    ExpressInterestInput:
      type: object
      properties:
        interestedUserId:
          type: integer
      required: [interestedUserId]

    ConfirmOccupationInput:
      type: object
      properties:
        occupantName:
          type: string
        occupantApartment:
          type: string
        carPlate:
          type: string
        expectedExitTime:
          type: string
      required: [occupantName, occupantApartment, carPlate, expectedExitTime]

    SpotRequest:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        userApartment:
          type: string
        userPhone:
          type: string
        date:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        reason:
          type: string
          nullable: true
        status:
          type: string
          enum: [open, matched]
        offeredByUserId:
          type: integer
          nullable: true
        offeredByUserName:
          type: string
          nullable: true
        offeredByUserPhone:
          type: string
          nullable: true
        offeredByUserApartment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - userName
        - userApartment
        - userPhone
        - date
        - startTime
        - endTime
        - status
        - createdAt

    CreateSpotRequestInput:
      type: object
      properties:
        userId:
          type: integer
        date:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        reason:
          type: string
          nullable: true
      required: [userId, date, startTime, endTime]

    OfferSpotInput:
      type: object
      properties:
        offeredByUserId:
          type: integer
      required: [offeredByUserId]
